site_name: Cost Smell Library
site_url: https://library.inkfoot.dev
site_description: >-
  A browsable catalogue of cost smells — named patterns in an AI agent
  run's token attribution that usually mean wasted money.

# The per-smell pages under docs/smells/ and docs/catalogue.md are
# generated by build_pages.py at build time and are not committed; nav is
# left implicit so mkdocs lists whatever the generator produced.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
