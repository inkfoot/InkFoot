name: Deploy site

# On merge to main, regenerate the per-smell pages from the YAML
# definitions and publish the static site to library.inkfoot.dev.
on:
  push:
    branches: [main]
    paths:
      - "smells/**"
      - "site/**"
      - "schema/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "library-pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install site deps
        run: |
          python -m pip install --upgrade pip
          pip install -r site/requirements.txt
      - name: Render per-smell pages from the YAML definitions
        run: python site/build_pages.py
      - name: Build the static site (strict)
        # --strict turns broken links and other warnings into errors so a
        # bad template change fails the deploy instead of shipping a 404.
        working-directory: site
        run: mkdocs build --strict --site-dir _site
      - name: Upload artefact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    name: Deploy to library.inkfoot.dev
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
