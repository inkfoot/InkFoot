name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

  benchmark:
    name: Phase 0 perf benchmarks (§9.1)
    runs-on: ubuntu-latest
    # Run after unit tests pass — no point benchmarking broken code.
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run all six §9.1 benchmark gates
        run: |
          pytest tests/benchmarks --benchmark-only \
            --benchmark-json=benchmark.json
      - name: Upload benchmark artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-benchmarks-${{ github.sha }}
          path: benchmark.json
          retention-days: 30

  attribution-validation:
    name: Attribution accuracy (§5.3 invariant, < 10% per-cat)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run validation harness
        # Phase-0 go/no-go gate. Fails CI when any input-side
        # category's mean relative error across the corpus exceeds
        # 10%. The corpus lives under tests/fixtures/validation/.
        run: python scripts/validate_attribution.py
      - name: Upload validation report
        if: always()
        run: python scripts/validate_attribution.py --json > validation-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: attribution-validation-${{ github.sha }}
          path: validation-report.json
          retention-days: 30
