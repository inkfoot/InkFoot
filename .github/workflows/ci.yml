name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

  postgres-integration:
    name: Postgres backend integration
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inkfoot
          POSTGRES_PASSWORD: inkfoot
          POSTGRES_DB: inkfoot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inkfoot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package + dev + postgres deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"
      - name: Run Postgres-gated tests
        env:
          INKFOOT_TEST_PG_DSN: postgresql://inkfoot:inkfoot@127.0.0.1:5432/inkfoot
        run: pytest tests -m postgres -v --tb=short

  benchmark:
    name: Performance benchmarks (§9.1)
    runs-on: ubuntu-latest
    # Run after unit tests pass — no point benchmarking broken code.
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run all six §9.1 benchmark gates
        run: |
          pytest tests/benchmarks --benchmark-only \
            --benchmark-json=benchmark.json
      - name: Upload benchmark artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inkfoot-benchmarks-${{ github.sha }}
          path: benchmark.json
          retention-days: 30

  attribution-validation:
    name: Attribution accuracy (§5.3 invariant, < 10% per-cat)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run validation harness (gate + JSON artefact in one pass)
        # current go/no-go gate. Fails CI when any input-side
        # category's mean relative error across the corpus exceeds
        # 10%. The corpus lives under tests/fixtures/validation/.
        # ``--report-json`` writes the machine-readable report to a
        # file while the human-friendly text goes to stdout — one
        # invocation does both jobs (avoiding the duplicate run
        # this step had before).
        run: |
          python scripts/validate_attribution.py \
            --report-json validation-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: attribution-validation-${{ github.sha }}
          path: validation-report.json
          retention-days: 30
