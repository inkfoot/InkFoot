name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "inkfoot/**/*.py"  # docstrings flow into the Python API reference
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "inkfoot/**/*.py"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]" pytest
      - name: Check documentation links
        # Validates intra-page ``#anchor`` targets, nav entries, and
        # orphan pages — the failure modes ``mkdocs build --strict``
        # does not catch on its own. Fails the deploy before a broken
        # link can ship.
        run: pytest tests/docs -v --tb=short
      - name: Build docs (strict)
        # `--strict` upgrades broken links and orphan files to errors
        # so a typo in a relative link fails the build instead of
        # silently shipping a 404.
        run: mkdocs build --strict --site-dir _site
      - name: Upload artefact for Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to inkfoot.dev
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
